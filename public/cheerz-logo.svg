<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="glassShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="5" y="5" width="190" height="190" rx="40" fill="none" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- Camera body -->
  <rect x="18" y="68" width="164" height="112" rx="14"
        fill="rgba(0,0,0,0.22)" stroke="white" stroke-width="3" stroke-opacity="0.85"/>

  <!-- Viewfinder bump (top center) -->
  <path d="M72,68 L72,50 Q72,40 82,40 L118,40 Q128,40 128,50 L128,68"
        fill="rgba(0,0,0,0.22)" stroke="white" stroke-width="3" stroke-opacity="0.85"
        stroke-linejoin="round"/>

  <!-- Shutter button dot in viewfinder area -->
  <circle cx="100" cy="54" r="4" fill="white" opacity="0.35"/>

  <!-- Lens outer ring -->
  <circle cx="100" cy="124" r="37" fill="rgba(0,0,0,0.18)" stroke="white" stroke-width="2.5" stroke-opacity="0.8"/>
  <!-- Lens inner ring (subtle detail) -->
  <circle cx="100" cy="124" r="25" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.22"/>

  <!-- ── LEFT champagne flute, tilted right 16° around base center (85, 140) ── -->
  <g transform="rotate(16, 85, 140)">
    <!-- Bowl (trapezoid: wide top, narrow bottom) -->
    <polygon points="78,108 92,108 88,130 82,130" fill="white" opacity="0.92"/>
    <!-- Liquid fill inside bowl -->
    <polygon points="80,112 90,112 87,130 83,130" fill="rgba(255,255,255,0.25)"/>
    <!-- Stem -->
    <rect x="84" y="130" width="2.5" height="9" fill="white" opacity="0.9"/>
    <!-- Base -->
    <rect x="79" y="139" width="12" height="2.5" rx="1.2" fill="white" opacity="0.9"/>
  </g>

  <!-- ── RIGHT champagne flute, tilted left 16° around base center (115, 140) ── -->
  <g transform="rotate(-16, 115, 140)">
    <!-- Bowl -->
    <polygon points="108,108 122,108 118,130 112,130" fill="white" opacity="0.92"/>
    <!-- Liquid fill -->
    <polygon points="110,112 120,112 117,130 113,130" fill="rgba(255,255,255,0.25)"/>
    <!-- Stem -->
    <rect x="113.5" y="130" width="2.5" height="9" fill="white" opacity="0.9"/>
    <!-- Base -->
    <rect x="109" y="139" width="12" height="2.5" rx="1.2" fill="white" opacity="0.9"/>
  </g>

  <!-- ── Clink sparkle ── -->
  <g filter="url(#glow)">
    <!-- Center dot -->
    <circle cx="100" cy="109" r="2.2" fill="white" opacity="0.98"/>
    <!-- 4 long rays -->
    <line x1="100" y1="105" x2="100" y2="100" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
    <line x1="100" y1="113" x2="100" y2="118" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    <line x1="104.2" y1="106.8" x2="108" y2="103.5" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
    <line x1="95.8" y1="106.8" x2="92" y2="103.5" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
    <!-- 4 short diagonal rays -->
    <line x1="103" y1="111.5" x2="106" y2="114" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="97" y1="111.5" x2="94" y2="114" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <!-- Bubbles rising -->
    <circle cx="95" cy="101" r="1.3" fill="white" opacity="0.6"/>
    <circle cx="105" cy="99" r="1" fill="white" opacity="0.5"/>
    <circle cx="99" cy="96" r="0.9" fill="white" opacity="0.4"/>
  </g>

  <!-- ── QR finder square — top left ── -->
  <g transform="translate(24,74)">
    <rect width="16" height="16" rx="3" fill="white" opacity="0.82"/>
    <rect x="3" y="3" width="10" height="10" rx="1.5" fill="#6d28d9"/>
    <rect x="5.5" y="5.5" width="5" height="5" fill="white" opacity="0.82"/>
  </g>

  <!-- ── QR finder square — top right ── -->
  <g transform="translate(160,74)">
    <rect width="16" height="16" rx="3" fill="white" opacity="0.82"/>
    <rect x="3" y="3" width="10" height="10" rx="1.5" fill="#be185d"/>
    <rect x="5.5" y="5.5" width="5" height="5" fill="white" opacity="0.82"/>
  </g>

  <!-- ── QR finder square — bottom left ── -->
  <g transform="translate(24,158)">
    <rect width="16" height="16" rx="3" fill="white" opacity="0.82"/>
    <rect x="3" y="3" width="10" height="10" rx="1.5" fill="#6d28d9"/>
    <rect x="5.5" y="5.5" width="5" height="5" fill="white" opacity="0.82"/>
  </g>

  <!-- ── QR data dots (bottom right, 4th corner) ── -->
  <g fill="white" opacity="0.32">
    <rect x="160" y="158" width="4" height="4" rx="1"/>
    <rect x="166" y="158" width="4" height="4" rx="1"/>
    <rect x="172" y="158" width="4" height="4" rx="1"/>
    <rect x="160" y="164" width="4" height="4" rx="1"/>
    <rect x="172" y="164" width="4" height="4" rx="1"/>
    <rect x="166" y="164" width="4" height="4" rx="1"/>
    <rect x="160" y="170" width="4" height="4" rx="1"/>
    <rect x="166" y="170" width="4" height="4" rx="1"/>
    <rect x="172" y="170" width="4" height="4" rx="1"/>
  </g>
</svg>
